name: SuperconductorMobileCompanion
options:
  bundleIdPrefix: engineering.super
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "8SP9G4G36N"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  SuperconductorMobileCompanion:
    type: application
    platform: macOS
    sources:
      - main.swift
      - AppDelegate.swift
      - StatusBarController.swift
      - Models
      - Services
      - Views
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: engineering.super.mobile.companion
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Superconductor Mobile
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: SuperconductorMobileCompanion.entitlements
    dependencies: []